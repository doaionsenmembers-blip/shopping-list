<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="お買い物">
    <title>お買い物リスト</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --orange: #FF9500;
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text: #000000;
            --text-sub: #6C6C70;
            --sep: #C6C6C8;
            --checked-bg: #F0FFF4;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        /* ---- HEADER ---- */
        .header {
            background: var(--card);
            padding: 14px 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 0 var(--sep);
        }
        .header-top {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .header-title {
            font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
            display: flex; align-items: center; gap: 8px;
        }
        .sync-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--sep); flex-shrink: 0;
            transition: background 0.3s;
        }
        .sync-dot.synced  { background: var(--success); }
        .sync-dot.syncing { background: var(--orange); }
        .sync-dot.error   { background: var(--danger); }
        .header-actions { display: flex; gap: 6px; }
        .btn-text {
            background: none; border: none;
            font-size: 15px; font-weight: 600;
            color: var(--primary); padding: 5px 10px;
            border-radius: 8px; cursor: pointer;
        }
        .btn-text.danger { color: var(--danger); }

        /* Store tabs */
        .store-tabs {
            display: flex; gap: 6px;
            overflow-x: auto; padding-bottom: 12px;
            scrollbar-width: none;
        }
        .store-tabs::-webkit-scrollbar { display: none; }
        .store-tab {
            white-space: nowrap; padding: 7px 16px;
            border-radius: 20px; border: none;
            background: var(--bg); color: var(--text-sub);
            font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.15s; flex-shrink: 0;
        }
        .store-tab.active { background: var(--primary); color: #fff; }

        /* ---- MEMO ---- */
        .memo-wrap { margin: 12px 16px 0; }
        .memo-textarea {
            width: 100%; min-height: 52px; max-height: 140px;
            padding: 11px 14px;
            border: 1.5px solid var(--sep); border-radius: 14px;
            font-size: 15px; font-family: inherit;
            background: var(--card); color: var(--text);
            outline: none; resize: none; line-height: 1.5;
            transition: border-color 0.15s, box-shadow 0.15s;
            box-shadow: 0 1px 3px rgba(0,0,0,.05); overflow-y: auto;
        }
        .memo-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,122,255,.12);
        }
        .memo-textarea::placeholder { color: #AEAEB2; }

        /* ---- CONTENT ---- */
        .content { padding: 12px 16px; }

        /* ---- SECTION ---- */
        .section {
            background: var(--card); border-radius: 14px;
            margin-bottom: 12px; overflow: hidden;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
        }
        .section-header {
            padding: 9px 16px; font-size: 12px; font-weight: 700;
            color: var(--text-sub); text-transform: uppercase;
            letter-spacing: 0.6px; background: #FAFAFA;
            border-bottom: 1px solid var(--sep);
            display: flex; align-items: center; gap: 6px;
        }
        .checked-badge {
            background: var(--success); color: #fff;
            font-size: 11px; font-weight: 700;
            padding: 1px 7px; border-radius: 10px;
        }

        /* ---- ITEM ROW ---- */
        .item-row {
            display: flex; align-items: center;
            padding: 10px 14px; border-bottom: 1px solid var(--sep);
            gap: 10px; transition: background 0.15s; min-height: 60px;
        }
        .item-row:last-child { border-bottom: none; }
        .item-row.checked { background: var(--checked-bg); }

        .item-check {
            width: 26px; height: 26px; border-radius: 50%;
            border: 2px solid var(--sep);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            transition: all 0.15s; font-size: 14px; color: transparent;
        }
        .item-check.checked { background: var(--success); border-color: var(--success); color: #fff; }

        .item-info { flex: 1; min-width: 0; }
        .item-name {
            font-size: 16px; font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            display: flex; align-items: center; gap: 5px;
        }
        .item-name.checked { color: var(--text-sub); }
        .item-meta { font-size: 12px; color: var(--text-sub); margin-top: 1px; }
        .always-star { font-size: 11px; color: var(--orange); flex-shrink: 0; }
        .unit-badge { font-size: 11px; color: var(--text-sub); background: var(--bg); border-radius: 4px; padding: 1px 4px; margin-left: 4px; font-weight: 500; }

        /* ---- DRAG & DROP ---- */
        .item-row.drag-src { opacity: 0.3; }
        .drag-ghost {
            position: fixed; pointer-events: none; z-index: 9999;
            box-shadow: 0 8px 28px rgba(0,0,0,0.22); border-radius: 14px;
            opacity: 0.92; background: var(--card);
        }
        .drag-placeholder {
            border: 2px dashed var(--primary); border-radius: 14px;
            background: rgba(0,122,255,0.07); margin: 3px 0;
            transition: none;
        }

        /* ---- QTY WRAP ---- */
        .qty-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
        .qty-controls { display: flex; align-items: center; gap: 4px; }
        .qty-btn {
            width: 30px; height: 30px; border-radius: 50%; border: none;
            font-size: 20px; font-weight: 400; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            line-height: 1; flex-shrink: 0; transition: transform 0.1s;
        }
        .qty-btn:active { transform: scale(0.9); }
        .qty-btn.plus  { background: var(--primary); color: #fff; }
        .qty-btn.minus { background: #E5E5EA; color: var(--text-sub); }
        .qty-display { font-size: 14px; font-weight: 700; min-width: 44px; text-align: center; }

        /* 在庫 */
        .inv-row {
            display: flex; align-items: center; gap: 3px;
            background: #EFEFF4; border-radius: 10px; padding: 3px 7px;
        }
        .inv-label { font-size: 10px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.3px; margin-right: 2px; }
        .inv-btn {
            width: 20px; height: 20px; border-radius: 50%;
            border: 1px solid #C6C6C8; background: var(--card);
            font-size: 15px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            line-height: 1; flex-shrink: 0; color: var(--text-sub);
            transition: transform 0.1s;
        }
        .inv-btn:active { transform: scale(0.88); }
        .inv-display { font-size: 13px; font-weight: 700; min-width: 30px; text-align: center; }

        /* Edit buttons */
        .item-edit-btns { display: flex; gap: 6px; flex-shrink: 0; }
        .btn-edit-sm, .btn-del-sm {
            width: 32px; height: 32px; border-radius: 8px; border: none;
            cursor: pointer; font-size: 15px;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-edit-sm { background: #E3F0FF; }
        .btn-del-sm  { background: #FFECEC; }

        /* ---- FAB ---- */
        .fab {
            position: fixed; bottom: 28px; right: 20px;
            width: 58px; height: 58px; border-radius: 50%;
            background: var(--primary); color: #fff; border: none;
            font-size: 30px; cursor: pointer;
            box-shadow: 0 4px 18px rgba(0,122,255,.45);
            display: flex; align-items: center; justify-content: center;
            z-index: 200; transition: transform 0.15s;
        }
        .fab:active { transform: scale(0.93); }

        /* ---- MODAL ---- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.45);
            z-index: 1000; display: none; align-items: flex-end; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--card); border-radius: 22px 22px 0 0;
            width: 100%; max-height: 92vh; overflow-y: auto;
            padding: 20px 20px 44px; animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(60px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .modal-handle { width: 40px; height: 4px; background: var(--sep); border-radius: 2px; margin: 0 auto 16px; }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .modal-title { font-size: 19px; font-weight: 700; }
        .modal-close {
            background: var(--bg); border: none; width: 30px; height: 30px;
            border-radius: 50%; font-size: 16px; cursor: pointer; color: var(--text-sub);
            display: flex; align-items: center; justify-content: center;
        }

        /* Form */
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 13px; font-weight: 700; color: var(--text-sub); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input, .form-select {
            width: 100%; padding: 13px 14px; border: 1.5px solid var(--sep);
            border-radius: 12px; font-size: 16px; font-family: inherit;
            background: var(--bg); color: var(--text); outline: none;
            transition: border-color 0.15s; appearance: none; -webkit-appearance: none;
        }
        .form-input:focus, .form-select:focus { border-color: var(--primary); background: #fff; }
        .select-wrap { position: relative; }
        .select-wrap::after { content: '▾'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-sub); pointer-events: none; }
        .store-chips { display: flex; flex-wrap: wrap; gap: 8px; }
        .store-chip-input { display: none; }
        .store-chip-label { padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--sep); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; user-select: none; }
        .store-chip-input:checked + .store-chip-label { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Toggle */
        .toggle-row { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border-radius: 12px; padding: 13px 16px; cursor: pointer; }
        .toggle-row-left { display: flex; align-items: center; gap: 8px; }
        .toggle-row-icon { font-size: 20px; }
        .toggle-row-text { font-size: 15px; font-weight: 600; }
        .toggle-row-sub  { font-size: 12px; color: var(--text-sub); margin-top: 1px; }
        .toggle-input { display: none; }
        .toggle-switch { width: 51px; height: 31px; border-radius: 16px; background: #E5E5EA; position: relative; flex-shrink: 0; transition: background 0.2s; }
        .toggle-switch::after { content: ''; position: absolute; top: 3px; left: 3px; width: 25px; height: 25px; border-radius: 50%; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,.25); transition: transform 0.2s; }
        .toggle-input:checked ~ .toggle-switch { background: var(--orange); }
        .toggle-input:checked ~ .toggle-switch::after { transform: translateX(20px); }

        .btn-primary { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 4px; transition: opacity 0.15s; }
        .btn-primary:active { opacity: 0.85; }
        .btn-secondary { width: 100%; padding: 13px; background: var(--bg); color: var(--primary); border: 1.5px solid var(--primary); border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        .btn-danger-outline { width: 100%; padding: 13px; background: var(--bg); color: var(--danger); border: 1.5px solid var(--danger); border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; }

        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-sub); }
        .empty-icon  { font-size: 52px; margin-bottom: 12px; }
        .empty-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
        .empty-sub   { font-size: 14px; }

        .toast {
            position: fixed; bottom: 110px; left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(30,30,30,.9); color: #fff;
            padding: 10px 22px; border-radius: 22px;
            font-size: 14px; font-weight: 500; z-index: 3000; opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            white-space: nowrap; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .modal-divider { border: none; border-top: 1px solid var(--sep); margin: 18px 0; }
        .info-text { font-size: 14px; color: var(--text-sub); line-height: 1.6; margin-bottom: 14px; }
        .form-textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--sep); border-radius: 12px; font-size: 13px; font-family: monospace; background: var(--bg); color: var(--text); outline: none; resize: none; min-height: 100px; }
        .form-textarea:focus { border-color: var(--primary); background: #fff; }

        /* 同期ステータスバー */
        .sync-bar {
            font-size: 11px; color: var(--text-sub);
            text-align: center; padding: 4px;
            background: var(--bg);
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="header-top">
        <div class="header-title">
            🛒 お買い物リスト
            <span class="sync-dot" id="syncDot" title="同期状態"></span>
        </div>
        <div class="header-actions">
            <button class="btn-text" id="editModeBtn" onclick="toggleEditMode()">編集</button>
            <button class="btn-text" onclick="showShareModal()">共有</button>
        </div>
    </div>
    <div class="store-tabs">
        <button class="store-tab active" data-store="全て"          onclick="setStore('全て')">全て</button>
        <button class="store-tab"        data-store="スーパー"      onclick="setStore('スーパー')">スーパー</button>
        <button class="store-tab"        data-store="ドラッグストア" onclick="setStore('ドラッグストア')">ドラッグストア</button>
        <button class="store-tab"        data-store="アミカ"        onclick="setStore('アミカ')">アミカ</button>
        <button class="store-tab"        data-store="その他"        onclick="setStore('その他')">その他</button>
    </div>
</div>

<!-- Memo -->
<div class="memo-wrap">
    <textarea class="memo-textarea" id="memoText" placeholder="📝 メモ（特記事項・買い忘れなど）..."></textarea>
</div>

<!-- Main content -->
<div class="content" id="content"></div>

<!-- FAB -->
<button class="fab" onclick="showAddModal()" title="アイテムを追加">+</button>

<!-- ======= Add / Edit Item Modal ======= -->
<div class="modal-overlay" id="itemModal" onclick="overlayClose(event,'itemModal')">
    <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">アイテムを追加</div>
            <button class="modal-close" onclick="hideModal('itemModal')">✕</button>
        </div>
        <div class="form-group">
            <label class="form-label">名前 *</label>
            <input type="text" class="form-input" id="itemName" placeholder="例：牛乳" autocomplete="off">
        </div>
        <div class="form-group">
            <label class="form-label">カテゴリー</label>
            <div class="select-wrap">
                <select class="form-select" id="itemCategory">
                    <option value="野菜・果物">🥦 野菜・果物</option>
                    <option value="肉・魚">🥩 肉・魚</option>
                    <option value="乳製品・卵">🥛 乳製品・卵</option>
                    <option value="飲み物">🧃 飲み物</option>
                    <option value="お酒">🍶 お酒</option>
                    <option value="冷凍食品">🧊 冷凍食品</option>
                    <option value="お菓子">🍫 お菓子</option>
                    <option value="調味料・乾物">🧂 調味料・乾物</option>
                    <option value="日用品">🧴 日用品</option>
                    <option value="薬・健康">💊 薬・健康</option>
                    <option value="その他">📦 その他</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">単位（例：個・本・袋）</label>
            <input type="text" class="form-input" id="itemUnit" placeholder="個" autocomplete="off">
        </div>
        <div class="form-group">
            <label class="form-label">買う場所 *</label>
            <div class="store-chips">
                <input type="checkbox" class="store-chip-input" id="chip-スーパー"      value="スーパー">
                <label class="store-chip-label" for="chip-スーパー">スーパー</label>
                <input type="checkbox" class="store-chip-input" id="chip-ドラッグストア" value="ドラッグストア">
                <label class="store-chip-label" for="chip-ドラッグストア">ドラッグストア</label>
                <input type="checkbox" class="store-chip-input" id="chip-アミカ" value="アミカ">
                <label class="store-chip-label" for="chip-アミカ">アミカ</label>
                <input type="checkbox" class="store-chip-input" id="chip-その他" value="その他">
                <label class="store-chip-label" for="chip-その他">その他</label>
            </div>
        </div>
        <div class="form-group">
            <label class="toggle-row" for="itemAlwaysBuy">
                <div class="toggle-row-left">
                    <span class="toggle-row-icon">⭐</span>
                    <div>
                        <div class="toggle-row-text">毎回買う</div>
                        <div class="toggle-row-sub">リセット時に自動でチェックが入ります</div>
                    </div>
                </div>
                <input type="checkbox" class="toggle-input" id="itemAlwaysBuy">
                <span class="toggle-switch"></span>
            </label>
        </div>
        <button class="btn-primary" onclick="saveItem()">保存する</button>
    </div>
</div>

<!-- ======= Share / Sync Modal ======= -->
<div class="modal-overlay" id="shareModal" onclick="overlayClose(event,'shareModal')">
    <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <div class="modal-title">共有・同期</div>
            <button class="modal-close" onclick="hideModal('shareModal')">✕</button>
        </div>
        <p class="info-text">マスターリストをJSON形式でエクスポートし、他のデバイスでインポートすることで共有できます。<br>チェック・メモはFirebaseでリアルタイム同期されます 🔄</p>
        <button class="btn-primary" onclick="exportData()" style="margin-bottom:10px;">
            📤 マスターリストをコピー
        </button>
        <button class="btn-secondary" onclick="toggleImportArea()">
            📥 データをインポート
        </button>
        <div id="importArea" style="display:none;margin-top:4px;">
            <label class="form-label" style="margin-bottom:6px;">コピーしたデータを貼り付け</label>
            <textarea class="form-textarea" id="importText" placeholder="ここに貼り付けてください..."></textarea>
            <button class="btn-primary" onclick="importData()" style="margin-top:8px;">インポートする</button>
        </div>
        <hr class="modal-divider">
        <button class="btn-danger-outline" onclick="confirmResetSession()">
            🔄 今回の買い物をリセット
        </button>
        <p style="font-size:12px;color:var(--text-sub);margin-top:8px;text-align:center;">
            ⭐ 毎回買う設定のアイテムは自動でチェックが入ります
        </p>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>

// =============================================
// STATE
// =============================================
let items = [];
let session = {};
let memo = '';
let currentStore = '全て';
let editMode = false;
let editingId = null;
let nextId = 200;
let _lastSyncedSession = '';
let _lastSyncedMemo = '';
let _pollTimer = null;
let _memoSaveTimer = null;
let _isSyncing = false;

// =============================================
// FIREBASE REST API
// =============================================
function setSyncStatus(status) {
    const dot = document.getElementById('syncDot');
    if (!dot) return;
    dot.className = 'sync-dot ' + status;
}

async function fbGet(path) {
    const res = await fetch(`${DB_URL}/${path}.json`);
    if (!res.ok) throw new Error('fetch failed');
    return await res.json();
}

async function fbSet(path, data) {
    const res = await fetch(`${DB_URL}/${path}.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error('set failed');
}

// =============================================
// STORAGE（localStorage + Firebase）
// =============================================
function mergeDefaultItems() {
    // DEFAULT_ITEMSの中でまだitemsにないものを追加する
    const existingIds = new Set(items.map(i => i.id));
    const missing = DEFAULT_ITEMS.filter(i => !existingIds.has(i.id));
    if (missing.length > 0) {
        items = [...items, ...missing.map(i => ({...i}))];
    }
}

function loadLocal() {
    try {
        const si = localStorage.getItem('sq_items');
        const ss = localStorage.getItem('sq_session');
        const sn = localStorage.getItem('sq_nextId');
        const sm = localStorage.getItem('sq_memo');
        items   = si ? JSON.parse(si) : DEFAULT_ITEMS.map(i => ({...i}));
        session = ss ? JSON.parse(ss) : {};
        nextId  = sn ? parseInt(sn) : (Math.max(0, ...items.map(i => i.id)) + 1);
        memo    = sm || '';
        mergeDefaultItems(); // 新しいデフォルト商品を自動追加
    } catch(e) {
        items = DEFAULT_ITEMS.map(i => ({...i}));
        session = {}; nextId = 200; memo = '';
    }
}

function saveLocal() {
    localStorage.setItem('sq_items',   JSON.stringify(items));
    localStorage.setItem('sq_session', JSON.stringify(session));
    localStorage.setItem('sq_nextId',  String(nextId));
    localStorage.setItem('sq_memo',    memo);
}

async function saveSessionToFirebase() {
    const data = { session, memo, items, nextId };
    const json = JSON.stringify(data);
    if (json === _lastSyncedSession) return;
    setSyncStatus('syncing');
    try {
        await fbSet('sharedData', data);
        _lastSyncedSession = json;
        setSyncStatus('synced');
    } catch(e) {
        setSyncStatus('error');
    }
}

async function loadFromFirebase() {
    try {
        const data = await fbGet('sharedData');
        if (!data) return false;
        const json = JSON.stringify(data);
        if (json === _lastSyncedSession) return false; // 変化なし
        _lastSyncedSession = json;
        // 更新があれば反映
        if (data.session) session = data.session;
        if (typeof data.memo === 'string') memo = data.memo;
        if (Array.isArray(data.items) && data.items.length > 0) items = data.items;
        if (data.nextId) nextId = data.nextId;
        mergeDefaultItems(); // 新しいデフォルト商品を自動追加
        saveLocal();
        return true;
    } catch(e) {
        setSyncStatus('error');
        return false;
    }
}

// =============================================
// POLLING（3秒ごとに同期）
// =============================================
async function poll() {
    if (_isSyncing) return;
    _isSyncing = true;
    try {
        const changed = await loadFromFirebase();
        if (changed) {
            render();
            // メモも更新
            const memoEl = document.getElementById('memoText');
            if (memoEl && document.activeElement !== memoEl) {
                memoEl.value = memo;
                memoEl.style.height = 'auto';
                memoEl.style.height = Math.min(memoEl.scrollHeight, 140) + 'px';
            }
            setSyncStatus('synced');
        }
    } finally {
        _isSyncing = false;
    }
}

function startPolling() {
    if (_pollTimer) clearInterval(_pollTimer);
    _pollTimer = setInterval(poll, 3000);
}

// =============================================
// MEMO
// =============================================
function initMemo() {
    const el = document.getElementById('memoText');
    el.value = memo;
    el.addEventListener('input', () => {
        memo = el.value;
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 140) + 'px';
        saveLocal();
        // 入力が止まって1秒後にFirebaseへ保存
        clearTimeout(_memoSaveTimer);
        _memoSaveTimer = setTimeout(() => saveSessionToFirebase(), 1000);
    });
    if (memo) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 140) + 'px';
    }
}

// =============================================
// RENDER
// =============================================
function render() {
    const el = document.getElementById('content');
    let filtered = currentStore === '全て'
        ? items
        : items.filter(i => i.stores.includes(currentStore));

    if (filtered.length === 0) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-title">アイテムがありません</div><div class="empty-sub">「+」ボタンでアイテムを追加できます</div></div>`;
        return;
    }

    const checked   = filtered.filter(i =>  session[i.id]?.checked);
    const unchecked = filtered.filter(i => !session[i.id]?.checked);
    let html = '';

    if (checked.length > 0) {
        html += `<div class="section"><div class="section-header">✅ 買い物かご <span class="checked-badge">${checked.length}</span></div>${checked.map(renderRow).join('')}</div>`;
    }

    const usedCats = CATEGORIES.filter(c => unchecked.some(i => i.category === c));
    usedCats.forEach(cat => {
        const catItems = unchecked.filter(i => i.category === cat);
        if (!catItems.length) return;
        html += `<div class="section"><div class="section-header">${CAT_EMOJI[cat]||'📦'} ${cat}</div>${catItems.map(renderRow).join('')}</div>`;
    });

    el.innerHTML = html;
}

function renderRow(item) {
    const s        = session[item.id] || {};
    const checked  = !!s.checked;
    const qty      = s.quantity  ?? 1;
    const inv      = s.inventory ?? 0;
    const storeLbl = item.stores.join('・');
    const alwaysMark = item.alwaysBuy ? `<span class="always-star" title="毎回買う">⭐</span>` : '';
    const unitMark = /\d/.test(item.unit) ? `<span class="unit-badge">${esc(item.unit)}</span>` : '';
    const editBtns = editMode ? `<div class="item-edit-btns"><button class="btn-edit-sm" onclick="showEditModal(${item.id})">✏️</button><button class="btn-del-sm" onclick="deleteItem(${item.id})">🗑️</button></div>` : '';

    return `
        <div class="item-row${checked?' checked':''}" id="row-${item.id}" ontouchstart="dragTouchStart(event,${item.id})">
            <div class="item-check${checked?' checked':''}" onclick="toggleCheck(${item.id})">${checked?'✓':''}</div>
            <div class="item-info">
                <div class="item-name${checked?' checked':''}">${esc(item.name)}${unitMark}${alwaysMark}</div>
                ${currentStore==='全て'?`<div class="item-meta">${esc(storeLbl)}</div>`:''}
            </div>
            <div class="qty-wrap">
                <div class="qty-controls">
                    <button class="qty-btn minus" onclick="changeQty(${item.id},-1)">−</button>
                    <span class="qty-display" id="qty-${item.id}">${qty}</span>
                    <button class="qty-btn plus"  onclick="changeQty(${item.id},1)">+</button>
                </div>
                <div class="inv-row">
                    <span class="inv-label">在庫</span>
                    <button class="inv-btn" onclick="changeInv(${item.id},-1)">−</button>
                    <span class="inv-display" id="inv-${item.id}">${inv}</span>
                    <button class="inv-btn" onclick="changeInv(${item.id},1)">+</button>
                </div>
            </div>
            ${editBtns}
        </div>`;
}

function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// =============================================
// ACTIONS
// =============================================
function setStore(store) {
    currentStore = store;
    document.querySelectorAll('.store-tab').forEach(t => t.classList.toggle('active', t.dataset.store === store));
    render();
}

function toggleCheck(id) {
    if (!session[id]) session[id] = { checked: false, quantity: 1, inventory: 0 };
    session[id].checked = !session[id].checked;
    saveLocal(); render();
    saveSessionToFirebase();
}

function changeQty(id, delta) {
    if (!session[id]) session[id] = { checked: false, quantity: 1, inventory: 0 };
    const next = Math.max(1, (session[id].quantity ?? 1) + delta);
    session[id].quantity = next;
    saveLocal();
    const item = items.find(i => i.id === id);
    const el = document.getElementById(`qty-${id}`);
    if (el) el.textContent = `${next}`;
    saveSessionToFirebase();
}

function changeInv(id, delta) {
    if (!session[id]) session[id] = { checked: false, quantity: 1, inventory: 0 };
    const next = Math.max(0, (session[id].inventory ?? 0) + delta);
    session[id].inventory = next;
    saveLocal();
    const el = document.getElementById(`inv-${id}`);
    if (el) el.textContent = `${next}`;
    saveSessionToFirebase();
}

function toggleEditMode() {
    editMode = !editMode;
    const btn = document.getElementById('editModeBtn');
    btn.textContent = editMode ? '完了' : '編集';
    btn.className   = editMode ? 'btn-text danger' : 'btn-text';
    render();
}

// =============================================
// ITEM MODAL
// =============================================
function showAddModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'アイテムを追加';
    document.getElementById('itemName').value = '';
    document.getElementById('itemCategory').value = 'その他';
    document.getElementById('itemUnit').value = '個';
    document.getElementById('itemAlwaysBuy').checked = false;
    STORES.forEach(s => { document.getElementById(`chip-${s}`).checked = false; });
    document.getElementById('chip-スーパー').checked = true;
    showModal('itemModal');
    setTimeout(() => document.getElementById('itemName').focus(), 300);
}

function showEditModal(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'アイテムを編集';
    document.getElementById('itemName').value = item.name;
    document.getElementById('itemCategory').value = item.category;
    document.getElementById('itemUnit').value = item.unit;
    document.getElementById('itemAlwaysBuy').checked = !!item.alwaysBuy;
    STORES.forEach(s => { document.getElementById(`chip-${s}`).checked = item.stores.includes(s); });
    showModal('itemModal');
}

function saveItem() {
    const name = document.getElementById('itemName').value.trim();
    if (!name) { toast('名前を入力してください'); return; }
    const category  = document.getElementById('itemCategory').value;
    const unit      = document.getElementById('itemUnit').value.trim() || '個';
    const stores    = STORES.filter(s => document.getElementById(`chip-${s}`).checked);
    const alwaysBuy = document.getElementById('itemAlwaysBuy').checked;
    if (!stores.length) { toast('買う場所を選んでください'); return; }

    if (editingId != null) {
        const idx = items.findIndex(i => i.id === editingId);
        if (idx >= 0) items[idx] = { ...items[idx], name, category, unit, stores, alwaysBuy };
        toast('更新しました');
    } else {
        items.push({ id: nextId++, name, category, unit, stores, alwaysBuy });
        toast('追加しました');
    }
    saveLocal(); hideModal('itemModal'); render();
}

function deleteItem(id) {
    if (!confirm('このアイテムを削除しますか？')) return;
    items = items.filter(i => i.id !== id);
    delete session[id];
    saveLocal(); render(); toast('削除しました');
}

// =============================================
// SHARE
// =============================================
function showShareModal() {
    document.getElementById('importArea').style.display = 'none';
    document.getElementById('importText').value = '';
    showModal('shareModal');
}

function exportData() {
    const data = JSON.stringify({ items, nextId });
    if (navigator.clipboard) {
        navigator.clipboard.writeText(data)
            .then(() => toast('コピーしました！他のデバイスに貼り付けてください'))
            .catch(() => fallbackCopy(data));
    } else { fallbackCopy(data); }
}

function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('コピーしました！');
}

function toggleImportArea() {
    const a = document.getElementById('importArea');
    a.style.display = a.style.display === 'none' ? 'block' : 'none';
}

function importData() {
    const text = document.getElementById('importText').value.trim();
    try {
        const data = JSON.parse(text);
        if (!data.items || !Array.isArray(data.items)) throw new Error();
        if (!confirm(`${data.items.length}件のアイテムをインポートします。よろしいですか？`)) return;
        items = data.items;
        if (data.nextId) nextId = data.nextId;
        saveLocal(); render(); hideModal('shareModal');
        toast('インポートしました！');
    } catch(e) { toast('データの形式が正しくありません'); }
}

// =============================================
// RESET
// =============================================
async function confirmResetSession() {
    const alwaysCount = items.filter(i => i.alwaysBuy).length;
    const msg = alwaysCount > 0
        ? `チェック・数量をリセットし、⭐毎回買う設定の${alwaysCount}件を自動チェックします。よろしいですか？`
        : 'チェック・数量をすべてリセットしますか？';
    if (!confirm(msg)) return;

    const prevInv = {};
    Object.keys(session).forEach(id => { if (session[id].inventory) prevInv[id] = session[id].inventory; });

    session = {};

    Object.keys(prevInv).forEach(id => {
        if (!session[id]) session[id] = { checked: false, quantity: 1, inventory: 0 };
        session[id].inventory = prevInv[id];
    });

    items.forEach(item => {
        if (item.alwaysBuy) {
            if (!session[item.id]) session[item.id] = { checked: false, quantity: 1, inventory: 0 };
            session[item.id].checked  = true;
            session[item.id].quantity = session[item.id].quantity || 1;
        }
    });

    saveLocal(); render(); hideModal('shareModal');
    await saveSessionToFirebase();
    toast(`リセット完了${alwaysCount > 0 ? `・${alwaysCount}件を自動チェック✅` : ''}`);
}

// =============================================
// MODAL HELPERS
// =============================================
function showModal(id)  { document.getElementById(id).classList.add('show'); }
function hideModal(id)  { document.getElementById(id).classList.remove('show'); }
function overlayClose(e, id) { if (e.target === e.currentTarget) hideModal(id); }

// =============================================
// TOAST
// =============================================
let _toastTimer;
function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// =============================================
// KEYBOARD
// =============================================
document.getElementById('itemName').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveItem();
});

// =============================================
// INIT
// =============================================
// =============================================
// DRAG & DROP (長押しで並び替え)
// =============================================
let _drag = null;
let _lpTimer = null;
let _lpStart = null;

function dragTouchStart(e, id) {
    const touch = e.touches[0];
    _lpStart = { x: touch.clientX, y: touch.clientY };
    _lpTimer = setTimeout(() => {
        _lpTimer = null;
        const row = document.getElementById(`row-${id}`);
        if (!row) return;
        if (navigator.vibrate) navigator.vibrate(40);

        const rect = row.getBoundingClientRect();
        const ghost = row.cloneNode(true);
        ghost.removeAttribute('id');
        ghost.className = 'item-row drag-ghost';
        ghost.style.cssText += `left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;`;
        document.body.appendChild(ghost);

        const ph = document.createElement('div');
        ph.className = 'drag-placeholder';
        ph.style.height = rect.height + 'px';
        row.parentNode.insertBefore(ph, row);
        row.classList.add('drag-src');

        _drag = { id, ghost, ph, row, offY: touch.clientY - rect.top };
    }, 500);
}

function dragTouchMove(e) {
    if (_lpTimer && _lpStart) {
        const t = e.touches[0];
        if (Math.abs(t.clientX - _lpStart.x) > 8 || Math.abs(t.clientY - _lpStart.y) > 8) {
            clearTimeout(_lpTimer); _lpTimer = null;
        }
    }
    if (!_drag) return;
    e.preventDefault();
    const touch = e.touches[0];
    _drag.ghost.style.top = (touch.clientY - _drag.offY) + 'px';

    _drag.ghost.style.visibility = 'hidden';
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    _drag.ghost.style.visibility = '';

    const target = el?.closest('.item-row');
    if (target && target !== _drag.row && !target.classList.contains('drag-ghost')) {
        const rect = target.getBoundingClientRect();
        if (touch.clientY < rect.top + rect.height / 2) {
            target.parentNode.insertBefore(_drag.ph, target);
        } else {
            target.parentNode.insertBefore(_drag.ph, target.nextSibling);
        }
    }
}

function dragEnd() {
    clearTimeout(_lpTimer); _lpTimer = null;
    if (!_drag) return;

    const draggedId = _drag.id;
    const ph = _drag.ph;

    // プレースホルダーの直後にある item-row を探す（挿入位置の基準）
    let insertBeforeId = null;
    let sib = ph.nextElementSibling;
    while (sib) {
        if (sib.classList.contains('item-row') && sib !== _drag.row) {
            insertBeforeId = parseInt(sib.id.replace('row-', ''));
            break;
        }
        sib = sib.nextElementSibling;
    }

    // dragged itemをitemsから取り出して新しい位置に挿入
    const draggedItem = items.find(i => i.id === draggedId);
    if (draggedItem) {
        items = items.filter(i => i.id !== draggedId);
        if (insertBeforeId !== null) {
            const idx = items.findIndex(i => i.id === insertBeforeId);
            if (idx !== -1) {
                items.splice(idx, 0, draggedItem);
            } else {
                items.push(draggedItem);
            }
        } else {
            // プレースホルダーが末尾 → 同カテゴリの末尾に移動
            const cat = draggedItem.category;
            const lastCatIdx = items.reduce((acc, item, i) => item.category === cat ? i : acc, -1);
            items.splice(lastCatIdx + 1, 0, draggedItem);
        }
    }

    _drag.ghost.remove();
    _drag.ph.remove();
    _drag.row.classList.remove('drag-src');
    _drag = null;

    saveLocal();
    render();
    saveSessionToFirebase();
}

async function init() {
    loadLocal();
    setSyncStatus('syncing');

    // Firebaseから最新データを取得
    try {
        const changed = await loadFromFirebase();
        setSyncStatus('synced');
        if (changed) saveLocal();
    } catch(e) {
        setSyncStatus('error');
    }

    initMemo();
    render();
    startPolling();

    document.addEventListener('touchmove', dragTouchMove, { passive: false });
    document.addEventListener('touchend', dragEnd);
    document.addEventListener('touchcancel', dragEnd);
}

init();
</script>
